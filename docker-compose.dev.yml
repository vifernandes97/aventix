services:
  db:
    image: postgres:17-alpine
    container_name: aventix-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - aventix_pgdata_dev:/var/lib/postgresql/data

volumes:
  aventix_pgdata_dev: